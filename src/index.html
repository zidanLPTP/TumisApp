<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Tumis (Tugas, Waktu dan Musik)</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="pc-bezel" style="cursor: move;">
    <div class="crt-screen dithered-bg">
      
      <!-- Header Aplikasi -->
      <div class="panel-header" style="border-bottom: 4px solid #1a1a1a; padding-bottom: 8px; margin-bottom: 15px;">
        <div style="display: flex; align-items: center; gap: 8px;">
          <img src="assets/TUMIS.svg" style="height: 20px; width: auto;" alt="Tumis Icon"/>
          <span style="font-size: 20px; font-weight: bold; letter-spacing: 2px;">T U M I S</span>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
          <div style="background: #1a1a1a; color: #f7f4eb; padding: 2px 8px; font-size: 10px;">SYS_STATUS: ONLINE</div>
          <!-- Retro Window Controls -->
          <div style="display: flex; gap: 4px;">
            <button id="btn-win-minimize" class="btn-retro" style="padding: 2px 6px; font-size: 9px; font-weight: bold; background: var(--accent-primary);">_</button>
            <button id="btn-win-close" class="btn-retro" style="padding: 2px 6px; font-size: 9px; font-weight: bold; background: var(--accent-secondary); color: #fff;">X</button>
          </div>
        </div>
      </div>

      <!-- Bento Grid Dasbor -->
      <div class="bento-grid">
        
        <!-- Kolom 1: Kanban (TUGAS.EXE) -->
        <div class="terminal-panel" id="kanban-panel">
          <div class="panel-header">
            <div style="display: flex; align-items: center; gap: 6px;">
              <img src="assets/TUGAS.svg" style="height: 14px; width: auto;" alt="Tugas Icon"/>
              <span>TUGAS.EXE</span>
            </div>
            <span class="panel-badge" style="background: var(--accent-primary); color: var(--color-text);">KANBAN</span>
          </div>
          <div id="kanban-container" style="flex-grow: 1; display: flex; flex-direction: column;">
            <!-- Kanban Board will render here -->
            <div style="font-size: 11px; text-align: center; padding: 20px; color: #888;">Memuat Papan Kanban...</div>
          </div>
        </div>

        <!-- Kolom 2: Pomodoro (WAKTU.SYS) -->
        <div class="terminal-panel" id="timer-panel">
          <div class="panel-header">
            <div style="display: flex; align-items: center; gap: 6px;">
              <img src="assets/WAKTU.svg" style="height: 14px; width: auto;" alt="Waktu Icon"/>
              <span>WAKTU.SYS</span>
            </div>
            <span class="panel-badge">POMODORO</span>
          </div>
          <div id="timer-container" style="flex-grow: 1; display: flex; flex-direction: column;">
            <!-- Timer will render here -->
            <div style="font-size: 11px; text-align: center; padding: 20px; color: #888;">Memuat Timer...</div>
          </div>
        </div>

        <!-- Kolom 3: Musik & Downloader (AUDIO.DLL) -->
        <div class="terminal-panel" id="music-panel">
          <div class="panel-header">
            <div style="display: flex; align-items: center; gap: 6px;">
              <img src="assets/AUDIO.svg" style="height: 14px; width: auto;" alt="Audio Icon"/>
              <span>AUDIO.DLL</span>
            </div>
            <span class="panel-badge" style="background: var(--color-active); color: var(--color-text);">ONLINE</span>
          </div>
          <div id="music-container" style="flex-grow: 1; display: flex; flex-direction: column;">
            <!-- Music Player will render here -->
            <div style="font-size: 11px; text-align: center; padding: 20px; color: #888;">Memuat Musik...</div>
          </div>
        </div>

      </div>

    </div>
  </div>

  <script type="module">
    import { KanbanBoard, runKanbanTests } from './kanban.js';
    import { PomodoroTimer, runTimerTests } from './timer.js';
    import { MusicPlayer, runPlayerTests } from './audio.js';

    // Run self-tests
    try {
      runKanbanTests();
      runTimerTests();
      runPlayerTests();
    } catch (e) {
      console.error("Test failed: ", e);
    }

    // Simple Event Broker
    const eventBroker = {
      listeners: {},
      subscribe(event, callback) {
        if (!this.listeners[event]) this.listeners[event] = [];
        this.listeners[event].push(callback);
      },
      publish(event, data) {
        if (this.listeners[event]) {
          this.listeners[event].forEach(cb => cb(data));
        }
      }
    };

    window.eventBroker = eventBroker;

    // Initialize Kanban
    const kanban = new KanbanBoard(document.getElementById('kanban-container'), eventBroker);
    window.kanban = kanban;

    // Initialize Timer
    const timer = new PomodoroTimer(document.getElementById('timer-container'), eventBroker);
    window.timer = timer;

    // Initialize Music Player
    const player = new MusicPlayer(document.getElementById('music-container'), eventBroker);
    window.player = player;

    // Borderless Window controls
    if (window.__TAURI__) {
      const { getCurrentWindow } = window.__TAURI__.window;
      const appWindow = getCurrentWindow();
      
      document.getElementById('btn-win-minimize').addEventListener('click', () => {
        appWindow.minimize();
      });
      document.getElementById('btn-win-close').addEventListener('click', () => {
        appWindow.close();
      });

      // Custom window dragging logic for the TV casing
      const bezel = document.querySelector('.pc-bezel');
      bezel.addEventListener('mousedown', (e) => {
        if (e.buttons === 1) {
          // Ignore clicks on interactive controls so they work normally
          const interactive = e.target.closest('button, input, select, textarea, a, [draggable="true"], .delete-task-btn, .task-item, .playlist-item, #volume-slider, input[type="range"]');
          if (!interactive) {
            appWindow.startDragging();
          }
        }
      });
    } else {
      document.getElementById('btn-win-minimize').addEventListener('click', () => console.log("Window Minimize"));
      document.getElementById('btn-win-close').addEventListener('click', () => console.log("Window Close"));
    }

    // Global tactile click sound effect
    try {
      const clickSound = new Audio('assets/klik.mp3');
      clickSound.volume = 0.25;
      
      const playClickSFX = () => {
        const sfx = clickSound.cloneNode(true);
        sfx.volume = 0.25;
        sfx.play().catch(err => console.warn("SFX blocked: ", err));
      };

      document.addEventListener('click', (e) => {
        const target = e.target.closest('.btn-retro, .task-item, .delete-task-btn, .playlist-item, input, button');
        if (target) {
          playClickSFX();
        }
      });
    } catch (e) {
      console.warn("Failed to load click sfx: ", e);
    }

    // Windows 95/98 Custom Alert Dialog Override
    window.alert = function(message) {
      let icon = "ℹ️";
      let title = "TUMIS.EXE";
      if (message.includes("⚠️") || message.includes("SYSTEM HALT") || message.includes("gagal") || message.includes("tentukan") || message.includes("valid")) {
        icon = "⚠️";
        title = "SYSTEM WARNING";
      } else if (message.includes("🎉") || message.includes("⏱️") || message.includes("SELESAI")) {
        icon = "ℹ️";
        title = "SYSTEM MESSAGE";
      }

      // Extract emojis for clean retro text
      const cleanMessage = message.replace(/⚠️|🎉|⏱️|ℹ️/g, "").trim();

      const overlay = document.createElement('div');
      overlay.className = 'retro-modal-overlay';
      overlay.innerHTML = `
        <div class="retro-bento-dialog">
          <div class="retro-bento-titlebar">
            <span>${title}</span>
            <button class="retro-bento-titlebar-btn" id="win95-alert-close">X</button>
          </div>
          <div class="retro-bento-body">
            <span class="retro-bento-icon">${icon}</span>
            <span style="flex-grow: 1; white-space: pre-line; letter-spacing: 0.5px;">${cleanMessage}</span>
          </div>
          <div class="retro-bento-btn-container">
            <button class="retro-bento-btn" id="win95-alert-ok">OK</button>
          </div>
        </div>
      `;

      const screen = document.querySelector('.crt-screen');
      screen.appendChild(overlay);

      // Play synthesized classic retro warn beep
      if (window.player && window.player.ctx) {
        try {
          const osc = window.player.ctx.createOscillator();
          const gain = window.player.ctx.createGain();
          osc.connect(gain);
          gain.connect(window.player.ctx.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(880, window.player.ctx.currentTime); // 880Hz beep
          gain.gain.setValueAtTime(0.04, window.player.ctx.currentTime);
          osc.start();
          osc.stop(window.player.ctx.currentTime + 0.12);
        } catch (err) {
          console.warn("Synthesizer beep failed: ", err);
        }
      }

      const closeAlert = () => {
        if (screen.contains(overlay)) screen.removeChild(overlay);
      };

      overlay.querySelector('#win95-alert-close').addEventListener('click', closeAlert);
      const okBtn = overlay.querySelector('#win95-alert-ok');
      okBtn.addEventListener('click', closeAlert);
      okBtn.focus();
    };

    // Drag and drop barriers for Timer and Music panels
    const timerPanel = document.getElementById('timer-panel');
    const musicPanel = document.getElementById('music-panel');

    [timerPanel, musicPanel].forEach(panel => {
      panel.addEventListener('dragenter', (e) => {
        if (window.isDraggingTask) {
          e.preventDefault();
          panel.classList.add('drag-barrier');
        }
      });

      panel.addEventListener('dragover', (e) => {
        if (window.isDraggingTask) {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'none';
        }
      });

      panel.addEventListener('dragleave', () => {
        panel.classList.remove('drag-barrier');
      });

      panel.addEventListener('drop', (e) => {
        e.preventDefault();
        panel.classList.remove('drag-barrier');
      });
    });
  </script>
</body>
</html>

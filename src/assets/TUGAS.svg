<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- Garis Tepi Luar Utama (Dark Black/Brown Outline) -->
  <!-- Tab Atas Kiri -->
  <rect x="1" y="2" width="5" height="1" fill="#1a1a1a" />
  <rect x="1" y="3" width="1" height="1" fill="#1a1a1a" />
  <rect x="5" y="3" width="1" height="1" fill="#1a1a1a" />
  
  <!-- Garis Turun Langkah Tab (Stepped Tab Outline) -->
  <rect x="6" y="4" width="9" height="1" fill="#1a1a1a" />
  
  <!-- Sisi Kanan dan Kiri Bodi Utama -->
  <rect x="1" y="4" width="1" height="10" fill="#1a1a1a" />
  <rect x="14" y="5" width="1" height="9" fill="#1a1a1a" />
  
  <!-- Garis Bawah Bodi Utama -->
  <rect x="1" y="14" width="14" height="1" fill="#1a1a1a" />

  <!-- Isi Warna Bodi Folder (Solid Retro Flat Yellow/Manila) -->
  <!-- Isi Tab Atas -->
  <rect x="2" y="3" width="3" height="1" fill="#e5b54f" />
  
  <!-- Isi Badan Utama Folder -->
  <rect x="2" y="5" width="12" height="9" fill="#f2c55e" />
  
  <!-- Detail Garis Bayangan Dalam / Lipatan Depan Khas Win95 (Aksen Gelap) -->
  <rect x="2" y="5" width="12" height="1" fill="#e5b54f" />
  <rect x="2" y="6" width="1" height="8" fill="#ffe291" /> <!-- Highlight Terang Kiri -->
</svg>

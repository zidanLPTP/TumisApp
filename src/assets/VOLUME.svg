<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- Bagian Kotak Belakang Speaker (Body) -->
  <rect x="2" y="6" width="3" height="4" fill="#1a1a1a" />

  <!-- Bagian Corong Depan Segitiga Patah-Patah (Cone) -->
  <rect x="5" y="5" width="1" height="6" fill="#1a1a1a" />
  <rect x="6" y="4" width="1" height="8" fill="#1a1a1a" />
  <rect x="7" y="3" width="2" height="10" fill="#1a1a1a" />

  <!-- Gelombang Suara Kecil / Dalam (Inner Wave) -->
  <rect x="10" y="6" width="1" height="4" fill="#1a1a1a" />
  <rect x="11" y="5" width="1" height="1" fill="#1a1a1a" />
  <rect x="11" y="10" width="1" height="1" fill="#1a1a1a" />

  <!-- Gelombang Suara Besar / Luar (Outer Wave) -->
  <rect x="13" y="4" width="1" height="8" fill="#1a1a1a" />
  <rect x="14" y="3" width="1" height="1" fill="#1a1a1a" />
  <rect x="14" y="12" width="1" height="1" fill="#1a1a1a" />
</svg>

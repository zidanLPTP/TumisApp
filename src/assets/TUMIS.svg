  <rect x="5" y="2" width="1" height="2" fill="#787878" />

  <!-- Stiker Label Tengah (Crisp White) -->
  <rect x="3" y="7" width="10" height="8" fill="#ffffff" />
  
  <!-- Garis Tulis pada Stiker (Detail Y2K Retro) -->
